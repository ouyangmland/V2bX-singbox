name: Build and Release

permissions:
  contents: write
  actions: write
  attestations: write
  checks: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

on:
  workflow_dispatch:
  repository_dispatch:
    types: [new-mod-release]
  push:
    branches:
      - main
      - dev_new
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
          - goos: linux
            goarch: s390x
      fail-fast: false

    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: 0

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Get dependencies
        run: go mod download
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${GITHUB_SHA:0:8}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Build
        run: |
          OUTPUT="V2bX"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="V2bX.exe"
          fi
          GOEXPERIMENT=jsonv2 go build -ldflags="-X github.com/ouyangmland/V2bX-singbox/cmd.version=${VERSION} -s -w" -o "$OUTPUT" .
          ls -lh "$OUTPUT"
      - name: Prepare
        run: |
          mkdir -p build_assets
          cp README.md LICENSE build_assets/ 2>/dev/null || true
          cp example/*.json build_assets/ 2>/dev/null || true
          cp V2bX* build_assets/ 2>/dev/null || true
      - name: Package
        run: |
          ARCHIVE="V2bX-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}"
          cd build_assets
          zip -9vr "../$ARCHIVE.zip" . -x "*.DS_Store"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: $ARCHIVE
          path: ./V2bX-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}.zip
      - name: Release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./V2bX-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}.zip
          tag: ${{ github.ref }}
