name: Build and Release

permissions:
  contents: write
  actions: write
  attestations: write
  checks: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

on:
  workflow_dispatch:
  repository_dispatch:
    types: [new-mod-release]
  push:
    branches:
      - main
      - dev_new
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Get dependencies
        run: go mod download
      - name: Get version
        id: version
        run: |
          EVENT="${{ github.event_name }}"
          PAYLOAD_TAG="${{ github.event.client_payload.tag }}"
          if [ "$EVENT" = "release" ]; then
            VERSION="${{ github.ref_name }}"
          elif [ "$EVENT" = "repository_dispatch" ] && [ -n "$PAYLOAD_TAG" ]; then
            VERSION="$(echo "$PAYLOAD_TAG" | sed 's/^v//' | cut -d- -f2-)"
          else
            VERSION="${GITHUB_SHA:0:8}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "FILENAME_AMD64=V2bX-linux-amd64.zip" >> $GITHUB_ENV
          echo "FILENAME_ARM64=V2bX-linux-arm64.zip" >> $GITHUB_ENV
      - name: Build amd64
        run: |
          CGO_ENABLED=0 GOARCH=amd64 GOEXPERIMENT=jsonv2 go build -ldflags="-X github.com/ouyangmland/V2bX-singbox/cmd.version=${VERSION} -s -w" -o "V2bX-linux-amd64" .
          ls -lh V2bX-linux-amd64
      - name: Build arm64
        run: |
          CGO_ENABLED=0 GOARCH=arm64 GOEXPERIMENT=jsonv2 go build -ldflags="-X github.com/ouyangmland/V2bX-singbox/cmd.version=${VERSION} -s -w" -o "V2bX-linux-arm64" .
          ls -lh V2bX-linux-arm64
      - name: Prepare amd64
        run: |
          mkdir -p build_amd64
          cp README.md LICENSE build_amd64/ 2>/dev/null || true
          cp example/*.json build_amd64/ 2>/dev/null || true
          cp V2bX-linux-amd64 build_amd64/V2bX
          cd build_amd64
          zip -9vr "../V2bX-linux-amd64.zip" . -x "*.DS_Store"
      - name: Prepare arm64
        run: |
          mkdir -p build_arm64
          cp README.md LICENSE build_arm64/ 2>/dev/null || true
          cp example/*.json build_arm64/ 2>/dev/null || true
          cp V2bX-linux-arm64 build_arm64/V2bX
          cd build_arm64
          zip -9vr "../V2bX-linux-arm64.zip" . -x "*.DS_Store"
      - name: Upload amd64
        uses: actions/upload-artifact@v4
        with:
          name: V2bX-linux-amd64
          path: ${{ env.FILENAME_AMD64 }}
      - name: Upload arm64
        uses: actions/upload-artifact@v4
        with:
          name: V2bX-linux-arm64
          path: ${{ env.FILENAME_ARM64 }}
      - name: Get tag for release
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.ref_name }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            TAG="${{ github.event.client_payload.tag }}"
          else
            TAG=""
          fi
          # Strip v prefix and v2bx- prefix for display name
          RELEASE_NAME="V2bX $(echo "$TAG" | sed 's/^v//' | cut -d- -f2-)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_ENV

      - name: Create Release
        if: steps.get_tag.outputs.tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: ${{ env.RELEASE_NAME }}
          draft: false
          prerelease: false
          files: |
            ${{ env.FILENAME_AMD64 }}
            ${{ env.FILENAME_ARM64 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
