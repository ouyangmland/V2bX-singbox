name: Sync Mod Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */7 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Get latest sing-box_mod release
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/workflows/get-latest-tag.py > /tmp/tag.txt
          LATEST=$(cat /tmp/tag.txt | tr -d '\n')
          echo "tag=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Check and update go.mod
        env:
          LATEST_TAG: ${{ steps.latest.outputs.tag }}
        run: |
          CURRENT=$(grep "sing-box_mod v" go.mod | awk '{print $2}')
          echo "Current: ${CURRENT}, Latest: ${LATEST_TAG}"
          if [[ "${LATEST_TAG}" == "${CURRENT}" || -z "${LATEST_TAG}" ]]; then
            echo "SKIP_BUILD=true" >> "$GITHUB_ENV"
          else
            sed -i "s|github.com/ouyangmland/sing-box_mod v[^ ]*|github.com/ouyangmland/sing-box_mod ${LATEST_TAG}|" go.mod
            GOPROXY=https://proxy.golang.org,direct go mod tidy
            GOEXPERIMENT=jsonv2 go build -trimpath -o /tmp/v2bx .
            echo "SKIP_BUILD=false" >> "$GITHUB_ENV"
          fi

      - name: Commit and push
        if: env.SKIP_BUILD != 'true'
        env:
          LATEST_TAG: ${{ steps.latest.outputs.tag }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add go.mod go.sum && git commit -m "deps: ${LATEST_TAG}" && git push origin dev_new

  release:
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - run: GOPROXY=https://proxy.golang.org,direct go mod download

      - name: Build amd64
        run: |
          GOEXPERIMENT=jsonv2 CGO_ENABLED=0 go build -ldflags="-s -w" -o V2bX .
          mkdir -p dist && cp V2bX dist/V2bX-linux-amd64

      - name: Build arm64
        run: |
          GOEXPERIMENT=jsonv2 CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o V2bX .
          cp V2bX dist/V2bX-linux-arm64

      - name: Package
        run: |
          cd dist
          zip -9 ../V2bX-linux-amd64.zip V2bX-linux-amd64
          zip -9 ../V2bX-linux-arm64.zip V2bX-linux-arm64

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.sync.outputs.tag || 'v' && github.ref }}
          name: "V2bX ${{ github.ref }}"
          body: "Built from [sing-box_mod ${{ github.ref }}](https://github.com/ouyangmland/sing-box_mod/releases/tag/${{ github.ref }})."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload amd64
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./V2bX-linux-amd64.zip
          asset_name: V2bX-linux-amd64.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload arm64
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./V2bX-linux-arm64.zip
          asset_name: V2bX-linux-arm64.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
