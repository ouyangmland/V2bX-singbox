name: Sync Mod Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */7 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.push.outputs.tag }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Get latest sing-box_mod release
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/workflows/get-latest-tag.py > /tmp/tag.txt
          LATEST=$(cat /tmp/tag.txt | tr -d '\n')
          echo "tag=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Latest tag: '${LATEST}'"

      - name: Check and update
        id: check
        env:
          LATEST_TAG: ${{ steps.latest.outputs.tag }}
        run: |
          CURRENT=$(grep "sing-box_mod v" go.mod | awk '{print $2}')
          echo "Current: '${CURRENT}', Latest: '${LATEST_TAG}'"
          if [[ -n "${LATEST_TAG}" && "${LATEST_TAG}" != "${CURRENT}" ]]; then
            sed -i "s|github.com/ouyangmland/sing-box_mod v[^ ]*|github.com/ouyangmland/sing-box_mod ${LATEST_TAG}|" go.mod
            GOPROXY=https://proxy.golang.org,direct go mod tidy
            GOEXPERIMENT=jsonv2 go build -trimpath -o /tmp/v2bx .
            echo "tag=${LATEST_TAG}" > /tmp/tag_for_release
            echo "tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
            echo "UPDATED=true" >> "$GITHUB_ENV"
          else
            echo "UPDATED=false" >> "$GITHUB_ENV"
          fi

      - name: Commit and push
        if: env.UPDATED == 'true'
        env:
          LATEST_TAG: ${{ steps.latest.outputs.tag }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add go.mod go.sum
          git commit -m "${LATEST_TAG}"
          git push origin dev_new

      - name: Record tag for release job
        id: push
        env:
          LATEST_TAG: ${{ steps.latest.outputs.tag }}
        run: |
          echo "tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "${LATEST_TAG}" > /tmp/tag_file
