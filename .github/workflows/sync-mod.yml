name: Sync Mod Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */7 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Get latest sing-box_mod release
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/workflows/get-latest-tag.py > /tmp/tag.txt
          LATEST=$(cat /tmp/tag.txt | tr -d '\n')
          echo "tag=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Latest tag: '${LATEST}'"

      - name: Check go.mod
        env:
          LATEST_TAG: ${{ steps.latest.outputs.tag }}
        run: |
          CURRENT=$(grep "sing-box_mod v" go.mod | awk '{print $2}')
          echo "Current go.mod: '${CURRENT}'"
          echo "Latest tag: '${LATEST_TAG}'"
          echo "SKIP_BUILD=${{ steps.latest.outputs.tag == '' || steps.latest.outputs.tag == '' }}" >> "$GITHUB_ENV"

      - name: Tidy modules
        run: GOPROXY=https://proxy.golang.org,direct go mod tidy

      - name: Build test
        run: GOEXPERIMENT=jsonv2 go build -trimpath -o /tmp/v2bx .

      - name: Commit and push
        env:
          LATEST_TAG: ${{ steps.latest.outputs.tag }}
        run: |
          if [[ -z "${LATEST_TAG}" ]]; then
            echo "No new tag, skipping commit"
          else
            CURRENT=$(grep "sing-box_mod v" go.mod | awk '{print $2}')
            if [[ "${LATEST_TAG}" == "${CURRENT}" ]]; then
              echo "Already on ${LATEST_TAG}, skipping"
            else
              sed -i "s|github.com/ouyangmland/sing-box_mod v[^ ]*|github.com/ouyangmland/sing-box_mod ${LATEST_TAG}|" go.mod
              GOPROXY=https://proxy.golang.org,direct go mod tidy
              GOEXPERIMENT=jsonv2 go build -trimpath -o /tmp/v2bx .
              git config --global user.email "action@github.com"
              git config --global user.name "GitHub Action"
              git add go.mod go.sum && git commit -m "deps: ${LATEST_TAG}" && git push origin dev_new
            fi
          fi
