name: Sync Mod Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */7 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.latest.outputs.tag }}
      skipped: ${{ steps.check.outputs.skipped }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Get latest sing-box_mod release
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/workflows/get-latest-tag.py > /tmp/tag.txt
          LATEST=$(cat /tmp/tag.txt | tr -d '\n')
          echo "tag=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Check go.mod
        id: check
        run: |
          CURRENT=$(grep "sing-box_mod v" go.mod | awk '{print $2}')
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          if [[ "${{ steps.latest.outputs.tag }}" == "${CURRENT}" || -z "${{ steps.latest.outputs.tag }}" ]]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update and build
        if: steps.check.outputs.skipped == 'false'
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          sed -i "s|github.com/ouyangmland/sing-box_mod v[^ ]*|github.com/ouyangmland/sing-box_mod ${TAG}|" go.mod
          GOPROXY=https://proxy.golang.org,direct go mod tidy
          GOEXPERIMENT=jsonv2 go build -trimpath -o /tmp/v2bx .

      - name: Commit and push
        if: steps.check.outputs.skipped == 'false'
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add go.mod go.sum && git commit -m "deps: ${{ steps.latest.outputs.tag }}" && git push origin dev_new

  release:
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - run: GOPROXY=https://proxy.golang.org,direct go mod download

      - name: Build amd64
        run: |
          GOEXPERIMENT=jsonv2 CGO_ENABLED=0 go build -ldflags="-s -w" -o V2bX .
          mkdir -p dist && cp V2bX dist/V2bX-linux-amd64

      - name: Build arm64
        run: |
          GOEXPERIMENT=jsonv2 CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o V2bX .
          cp V2bX dist/V2bX-linux-arm64

      - name: Package
        run: |
          cd dist
          zip -9 ../V2bX-linux-amd64.zip V2bX-linux-amd64
          zip -9 ../V2bX-linux-arm64.zip V2bX-linux-arm64

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.sync.outputs.tag }}
          name: "V2bX ${{ needs.sync.outputs.tag }}"
          body: "Built from [sing-box_mod ${{ needs.sync.outputs.tag }}](https://github.com/ouyangmland/sing-box_mod/releases/tag/${{ needs.sync.outputs.tag }})."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload amd64
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./V2bX-linux-amd64.zip
          asset_name: V2bX-linux-amd64.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload arm64
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./V2bX-linux-arm64.zip
          asset_name: V2bX-linux-arm64.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
