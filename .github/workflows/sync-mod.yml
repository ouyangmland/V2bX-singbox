name: Sync Mod Release

on:
  schedule:
    - cron: '0 */7 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [new-mod-release]

concurrency:
  group: sync-mod
  cancel-in-progress: false

jobs:
  sync:
    name: Sync sing-box_mod
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.latest.outputs.tag }}
      skipped: ${{ steps.check.outputs.skipped }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Get latest sing-box_mod release tag
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python3 .github/workflows/get-latest-tag.py > /tmp/tag.txt
          LATEST=$(cat /tmp/tag.txt | tr -d '\n')
          echo "tag=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Latest mod tag: ${LATEST}"

      - name: Check current go.mod state
        id: check
        run: |
          CURRENT=$(grep "sing-box_mod v" go.mod | awk '{print $2}')
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "Current: ${CURRENT}, Latest: ${{ steps.latest.outputs.tag }}"
          if [[ "${{ steps.latest.outputs.tag }}" == "${CURRENT}" || -z "${{ steps.latest.outputs.tag }}" ]]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date, skipping"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update go.mod
        if: steps.check.outputs.skipped == 'false'
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          sed -i "s|github.com/ouyangmland/sing-box_mod v[^ ]*|github.com/ouyangmland/sing-box_mod ${TAG}|" go.mod
          grep "sing-box_mod" go.mod

      - name: Tidy modules
        if: steps.check.outputs.skipped == 'false'
        run: |
          GOPROXY=https://proxy.golang.org,direct go mod tidy

      - name: Verify build
        if: steps.check.outputs.skipped == 'false'
        run: |
          GOEXPERIMENT=jsonv2 go build -trimpath -o /tmp/v2bx-test . 2>&1 | tail -3
          du -h /tmp/v2bx-test

      - name: Commit and push
        if: steps.check.outputs.skipped == 'false'
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add go.mod go.sum
          git commit -m "deps: upgrade to ${{ steps.latest.outputs.tag }}"
          git push origin dev_new

  release:
    name: Build Linux Release
    runs-on: ubuntu-latest
    needs: sync
    if: needs.sync.outputs.skipped == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Get dependencies
        run: |
          GOPROXY=https://proxy.golang.org,direct go mod download

      - name: Build amd64
        run: |
          GOEXPERIMENT=jsonv2 CGO_ENABLED=0 go build -ldflags="-s -w" -o V2bX .
          mkdir -p dist
          cp V2bX dist/V2bX-linux-amd64

      - name: Build arm64
        run: |
          GOEXPERIMENT=jsonv2 CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o V2bX .
          cp V2bX dist/V2bX-linux-arm64

      - name: Package
        run: |
          cd dist
          zip -9 ../V2bX-linux-amd64.zip V2bX-linux-amd64
          zip -9 ../V2bX-linux-arm64.zip V2bX-linux-arm64

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.sync.outputs.tag }}
          name: "V2bX ${{ needs.sync.outputs.tag }}"
          body: |
            Built from [sing-box_mod ${{ needs.sync.outputs.tag }}](https://github.com/ouyangmland/sing-box_mod/releases/tag/${{ needs.sync.outputs.tag }}).
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload artifacts
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./V2bX-linux-amd64.zip
          asset_name: V2bX-linux-amd64.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload arm64
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./V2bX-linux-arm64.zip
          asset_name: V2bX-linux-arm64.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
